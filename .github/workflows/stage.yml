name: stage 2
on:
  push:
    branches:
      - master

jobs:
  create-files:
    runs-on: ubuntu-latest
    outputs:
      file-content: ${{steps.make-file.outputs.content}}
    steps:
      - name: show working directory
        run: pwd

      - name: create file
        id: make-file

        run: |
          echo "Hello from step 1" > shared.txt
          echo "content=direct shared values" >> "$GITHUB_OUTPUT"
          cat shared.txt
  read-file:
    runs-on: ubuntu-latest
    needs: create-files
    steps:
      - name: show working directory
        run: pwd
      - name: read file
        run: |
          cat shared.txt || echo "shared.txt not found"
          echo "Received content from previous job: ${{ needs.create-files.outputs.file-content}}"

  example-action:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use local action
        id: my-action
        uses: ./local-action/hello-packer
        with:
          username: 'Rayhan'
