name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.event.pull_request.number}}
  cancel-in-progress: true
jobs:
  demo:
    runs-on: ubuntu-latest
    env:
      MY_KEY: ${{ secrets.MY_KEY }}
    steps:
      - name: print my key
        run: echo " $MY_KEY"
