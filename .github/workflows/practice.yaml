name: condition and variables

on:
  push:
    branches:
      - master
jobs:
  setupenv:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    outputs:
      is-success: ${{ steps.set-value.outputs.is-success }}
    steps:
      - name: set value
        id: set-value
        run: |
          echo "is-success=true" >> $GITHUB_OUTPUT
  deploy:
    runs-on: ubuntu-latest
    needs: setupenv
    if: needs.setupenv.outputs.is-success =='true'
    steps:
      - name: deploy

        run: |
          echo "Deploying application..."
      - name: check env variable
        if: env.NODE_ENV == 'production'
        run: |
          echo "Running in production mode"
