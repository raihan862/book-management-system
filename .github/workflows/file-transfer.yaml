name: File transfer workflow
on:
  push:
    branches:
      - master

jobs:
  create-files:
    runs-on: ubuntu-latest
    steps:
      - name: create file
        run: |
          echo "Hello from step 1" > shared.txt
          echo "This is hardware information from the runner: $RUNNER_OS" >> shared2.txt
          cat shared.txt
          cat shared2.txt

      - name: upload file
        uses: actions/upload-artifact@v4
        with:
          name: core-pipeline-payload
          path: |
            shared.txt
            shared2.txt
  read-files:
    runs-on: ubuntu-latest
    needs: create-files
    steps:
      - name: download files
        uses: actions/download-artifact@v4
        with:
          name: core-pipeline-payload
      - name: show content
        run: |
          echo "Lets see if the files exists"
          cat shared.txt 
          cat shared2.txt
